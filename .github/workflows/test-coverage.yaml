name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: flake8 discount.py --max-line-length=100

      - name: Test with coverage
        run: pytest test_discount.py --cov=discount --cov-branch --cov-fail-under=75 --cov-report=term-missing

